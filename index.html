<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>フレーム合成アプリ</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--text:#f0f0f0;--text2:#888;--accent:#e8772e;--accent2:#f5a623;--green:#22c55e;--red:#ef4444;--r:14px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Yu Gothic',sans-serif;}
.app{max-width:480px;margin:0 auto;padding:0 16px 80px;}
header{padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:12px;}
header h1{font-size:17px;font-weight:700;}
header h1 em{font-style:normal;color:var(--accent);}
header p{font-size:11px;color:var(--text2);margin-top:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.ch{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.num.ok{background:var(--green);}
.ct{font-size:13px;font-weight:600;}
.cb{padding:12px 14px;}
.ua{border:1.5px dashed var(--border);border-radius:var(--rs);padding:16px;text-align:center;cursor:pointer;background:var(--surface2);display:flex;flex-direction:column;align-items:center;gap:5px;}
.ua:active{border-color:var(--accent);}
.ua.loaded{border-style:solid;border-color:var(--green);}
.ua img{max-height:90px;border-radius:6px;object-fit:contain;}
input[type=file]{display:none;}
.opts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.opt{flex:1;min-width:72px;padding:7px 6px;text-align:center;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;line-height:1.4;}
.opt.on{border-color:var(--accent);color:var(--accent);background:rgba(232,119,46,0.1);}
.go{width:100%;padding:15px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.go:disabled{opacity:.3;cursor:not-allowed;}
.go:active{opacity:.85;}
#adjCard{display:none;}
#adjCanvas{display:block;width:100%;border-radius:var(--rs);touch-action:none;}
.hint{font-size:11px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.7;}
.aacts{display:flex;gap:8px;margin-top:10px;}
.abtn{flex:1;padding:12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center;}
.abtn.pri{border-color:var(--accent);color:var(--accent);background:rgba(232,119,46,.08);}
.abtn:active{opacity:.7;}
#resCard{display:none;}
#resCanvas{display:block;width:100%;border-radius:var(--rs);}
.dlbtn{width:100%;margin-top:10px;padding:14px;border:1.5px solid var(--accent);border-radius:var(--rs);background:transparent;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;text-align:center;}
.dlbtn:active{background:rgba(232,119,46,.1);}
.rtbtn{width:100%;margin-top:8px;padding:11px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>フレーム<em>合成</em>アプリ</h1>
    <p>写真をアップロード → 位置調整 → SNS用ダウンロード</p>
  </header>

  <div class="card">
    <div class="ch"><div class="num" id="n1">1</div><span class="ct">人物写真</span></div>
    <div class="cb">
      <div class="ua" id="pArea" onclick="document.getElementById('pIn').click()">
        <span style="font-size:28px">📷</span>
        <span style="font-size:13px;color:var(--text2)">タップして写真を選択</span>
        <span style="font-size:11px;color:var(--text2)">JPG / PNG / HEIC</span>
      </div>
      <input type="file" id="pIn" accept="image/*">
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="num" id="n2">2</div><span class="ct">枠画像</span></div>
    <div class="cb">
      <div class="ua" id="fArea" onclick="document.getElementById('fIn').click()">
        <span style="font-size:28px">🖼</span>
        <span style="font-size:13px;color:var(--text2)">タップして枠を選択（PNG推奨）</span>
        <span style="font-size:11px;color:var(--text2)">透過PNG対応</span>
      </div>
      <input type="file" id="fIn" accept="image/*">
    </div>
  </div>

  <div class="card">
    <div class="ch"><div class="num" id="n3">3</div><span class="ct">設定</span></div>
    <div class="cb">
      <p style="font-size:11px;color:var(--text2);margin-bottom:6px;">出力サイズ</p>
      <div class="opts" id="sOpts">
        <div class="opt on" data-v="1080x1080">正方形<br>1080×1080</div>
        <div class="opt" data-v="1080x1920">縦型<br>1080×1920</div>
        <div class="opt" data-v="1200x630">横型<br>1200×630</div>
        <div class="opt" data-v="auto">枠に合わせる</div>
      </div>
      <p style="font-size:11px;color:var(--text2);margin-bottom:6px;">人物レイヤー</p>
      <div class="opts" id="lOpts">
        <div class="opt on" data-v="under">枠が前面</div>
        <div class="opt" data-v="over">人物が前面</div>
      </div>
      <button class="go" id="goBtn" disabled>▶ 調整画面へ進む</button>
    </div>
  </div>

  <div class="card" id="adjCard">
    <div class="ch"><div class="num" style="background:var(--accent2)">4</div><span class="ct">位置・サイズを調整</span></div>
    <div class="cb">
      <canvas id="adjCanvas"></canvas>
      <p class="hint">
        📱 スマホ：1本指でドラッグ移動 / 2本指でピンチ拡縮<br>
        💻 PC：ドラッグで移動 / スクロールでズーム
      </p>
      <div class="aacts">
        <button class="abtn" id="resetBtn">↩ リセット</button>
        <button class="abtn pri" id="applyBtn">✓ これで合成する</button>
      </div>
    </div>
  </div>

  <div class="card" id="resCard">
    <div class="ch"><div class="num ok">✓</div><span class="ct">合成完了！</span></div>
    <div class="cb">
      <canvas id="resCanvas"></canvas>
      <button class="dlbtn" id="dlBtn">⬇ 画像をダウンロード / 保存</button>
      <button class="rtbtn" id="rtBtn">↩ 調整に戻る</button>
    </div>
  </div>
</div>

<script>
var pImg=null, fImg=null;
var selSize='1080x1080', selLayer='under';
var outW=1080, outH=1080;
var adj={x:0,y:0,scale:1,bx:0,by:0,bs:1};
var ac=document.getElementById('adjCanvas');
var ctx=ac.getContext('2d');

['sOpts','lOpts'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){
    var b=e.target.closest('.opt');if(!b)return;
    this.querySelectorAll('.opt').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    if(id==='sOpts')selSize=b.dataset.v;else selLayer=b.dataset.v;
  });
});

function loadImg(file){
  return new Promise(function(res){
    var r=new FileReader();
    r.onload=function(e){var i=new Image();i.onload=function(){res(i);};i.src=e.target.result;};
    r.readAsDataURL(file);
  });
}

function markZone(aId,nId,img){
  var a=document.getElementById(aId);
  a.classList.add('loaded');a.innerHTML='';
  var el=document.createElement('img');el.src=img.src;el.style.maxHeight='90px';a.appendChild(el);
  var t=document.createElement('span');
  t.style.cssText='font-size:11px;color:var(--green);margin-top:4px;';
  t.textContent='✓ 読み込み完了（タップで変更）';a.appendChild(t);
  document.getElementById(nId).classList.add('ok');
  checkReady();
}

document.getElementById('pIn').onchange=async function(e){
  var f=e.target.files[0];if(!f)return;
  pImg=await loadImg(f);
  markZone('pArea','n1',pImg);
};
document.getElementById('fIn').onchange=async function(e){
  var f=e.target.files[0];if(!f)return;
  fImg=await loadImg(f);
  markZone('fArea','n2',fImg);
};

function checkReady(){
  document.getElementById('goBtn').disabled=!(pImg&&fImg);
}

function draw(){
  ctx.clearRect(0,0,ac.width,ac.height);
  var dw=pImg.naturalWidth*adj.scale;
  var dh=pImg.naturalHeight*adj.scale;
  if(selLayer==='over'){
    ctx.drawImage(fImg,0,0,ac.width,ac.height);
    ctx.drawImage(pImg,adj.x,adj.y,dw,dh);
  }else{
    ctx.drawImage(pImg,adj.x,adj.y,dw,dh);
    ctx.drawImage(fImg,0,0,ac.width,ac.height);
  }
}

function initAdj(){
  if(selSize==='auto'){outW=fImg.naturalWidth;outH=fImg.naturalHeight;}
  else{var p=selSize.split('x');outW=parseInt(p[0]);outH=parseInt(p[1]);}

  ac.width=outW; ac.height=outH;

  // 人物を画面中央に配置してフィット
  var pw=pImg.naturalWidth, ph=pImg.naturalHeight;
  var s=Math.max(outW/pw, outH/ph);
  var ix=(outW-pw*s)/2;
  var iy=(outH-ph*s)/2;
  adj={x:ix,y:iy,scale:s,bx:ix,by:iy,bs:s};
  draw();

  var card=document.getElementById('adjCard');
  card.style.display='';
  document.getElementById('resCard').style.display='none';
  setTimeout(function(){card.scrollIntoView({behavior:'smooth',block:'start'});},50);
  setupGesture();
}

function setupGesture(){
  var st=null,sa=null,md=false,ms=null,mas=null;

  ac.addEventListener('touchstart',function(e){
    e.preventDefault();
    st=Array.from(e.touches).map(function(t){return{x:t.clientX,y:t.clientY};});
    sa={x:adj.x,y:adj.y,scale:adj.scale};
  },{passive:false});

  ac.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(!st||!sa)return;
    var ts=Array.from(e.touches).map(function(t){return{x:t.clientX,y:t.clientY};});
    var cr=ac.getBoundingClientRect();
    var ratio=ac.width/cr.width;

    if(ts.length===1){
      adj.x=sa.x+(ts[0].x-st[0].x)*ratio;
      adj.y=sa.y+(ts[0].y-st[0].y)*ratio;
    } else if(ts.length>=2){
      var d0=Math.hypot(st[1].x-st[0].x,st[1].y-st[0].y);
      var d1=Math.hypot(ts[1].x-ts[0].x,ts[1].y-ts[0].y);
      var r=d1/d0;
      var cx=((st[0].x+st[1].x)/2-cr.left)*ratio;
      var cy=((st[0].y+st[1].y)/2-cr.top)*ratio;
      adj.scale=sa.scale*r;
      adj.x=cx-(cx-sa.x)*r;
      adj.y=cy-(cy-sa.y)*r;
    }
    draw();
  },{passive:false});

  ac.addEventListener('touchend',function(){st=null;sa=null;});

  ac.addEventListener('mousedown',function(e){
    e.preventDefault();
    md=true;
    var cr=ac.getBoundingClientRect();
    var ratio=ac.width/cr.width;
    ms={x:e.clientX,y:e.clientY};
    mas={x:adj.x,y:adj.y,scale:adj.scale};
  });
  window.addEventListener('mousemove',function(e){
    if(!md)return;
    var cr=ac.getBoundingClientRect();
    var ratio=ac.width/cr.width;
    adj.x=mas.x+(e.clientX-ms.x)*ratio;
    adj.y=mas.y+(e.clientY-ms.y)*ratio;
    draw();
  });
  window.addEventListener('mouseup',function(){md=false;});

  ac.addEventListener('wheel',function(e){
    e.preventDefault();
    var d=e.deltaY>0?0.93:1.07;
    var cr=ac.getBoundingClientRect();
    var ratio=ac.width/cr.width;
    var lx=(e.clientX-cr.left)*ratio;
    var ly=(e.clientY-cr.top)*ratio;
    adj.x=lx-(lx-adj.x)*d;
    adj.y=ly-(ly-adj.y)*d;
    adj.scale*=d;
    draw();
  },{passive:false});
}

document.getElementById('resetBtn').onclick=function(){
  adj.x=adj.bx;adj.y=adj.by;adj.scale=adj.bs;draw();
};

document.getElementById('applyBtn').onclick=function(){
  var rc=document.getElementById('resCanvas');
  rc.width=outW;rc.height=outH;
  rc.getContext('2d').drawImage(ac,0,0);
  document.getElementById('resCard').style.display='';
  setTimeout(function(){document.getElementById('resCard').scrollIntoView({behavior:'smooth',block:'start'});},50);
};

document.getElementById('rtBtn').onclick=function(){
  document.getElementById('resCard').style.display='none';
  document.getElementById('adjCard').scrollIntoView({behavior:'smooth'});
};

document.getElementById('dlBtn').onclick=function(){
  var rc=document.getElementById('resCanvas');
  var a=document.createElement('a');
  a.download='frame_'+Date.now()+'.png';
  a.href=rc.toDataURL('image/png');
  a.click();
};

document.getElementById('goBtn').onclick=function(){
  initAdj();
};
</script>
</body>
</html>
